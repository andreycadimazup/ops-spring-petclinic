<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <h2 th:text="#{owners}">Owners</h2>

  <form th:object="${ownerSearch}" th:action="@{/owners}" method="get" class="form-horizontal" id="search-owner-form">
    <div class="form-group">
      <label class="col-sm-2 control-label" th:text="#{lastName}">Last name</label>
      <div class="col-sm-4">
        <input class="form-control" th:field="*{lastName}" size="30" maxlength="80" />
      </div>
      <label class="col-sm-2 control-label" th:text="#{city}">City</label>
      <div class="col-sm-4">
        <input class="form-control" th:field="*{city}" size="30" maxlength="80" />
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-2 control-label" th:text="#{telephone}">Telephone</label>
      <div class="col-sm-4">
        <input class="form-control" th:field="*{telephone}" size="30" maxlength="20" />
      </div>
      <label class="col-sm-2 control-label" th:text="#{petType}">Pet type</label>
      <div class="col-sm-4">
        <select class="form-control" th:field="*{petTypeId}">
          <option value="" th:text="#{allPetTypes}">All pet types</option>
          <option th:each="petType : ${petTypes}" th:value="${petType.id}" th:text="${petType.name}">dog</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary" th:text="#{findOwner}">Find Owner</button>
        <a class="btn btn-default" th:href="@{/owners/find}" th:text="#{clearFilters}">Clear filters</a>
        <a class="btn btn-primary" th:href="@{/owners/new}" th:text="#{addOwner}">Add Owner</a>
      </div>
    </div>
  </form>

  <p th:text="#{owners.resultsFound(${totalItems})}">0 owners found</p>

  <div th:if="${hasActiveFilters}" class="well well-sm">
    <strong th:text="#{activeFilters}">Active filters</strong>
    <span th:if="${ownerSearch.lastName}" class="label label-info"
      th:text="#{lastName} + ': ' + ${ownerSearch.lastName}">Last name</span>
    <span th:if="${ownerSearch.city}" class="label label-info" th:text="#{city} + ': ' + ${ownerSearch.city}">City</span>
    <span th:if="${ownerSearch.telephone}" class="label label-info"
      th:text="#{telephone} + ': ' + ${ownerSearch.telephone}">Telephone</span>
    <span th:if="${activePetTypeLabel}" class="label label-info" th:text="#{petType} + ': ' + ${activePetTypeLabel}">Pet type</span>
  </div>

  <div th:if="${#lists.isEmpty(listOwners)}" class="alert alert-info" th:text="#{owners.noResults}">
    No owners found
  </div>

  <table th:unless="${#lists.isEmpty(listOwners)}" id="owners" class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}" style="width: 150px;">Name</th>
        <th th:text="#{address}" style="width: 200px;">Address</th>
        <th th:text="#{city}">City</th>
        <th th:text="#{telephone}" style="width: 120px">Telephone</th>
        <th th:text="#{pets}">Pets</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="owner : ${listOwners}">
        <td>
          <a th:href="@{/owners/__${owner.id}__}" th:text="${owner.firstName + ' ' + owner.lastName}" /></a>
        </td>
        <td th:text="${owner.address}" />
        <td th:text="${owner.city}" />
        <td th:text="${owner.telephone}" />
        <td><span th:text="${#strings.listJoin(owner.pets, ', ')}" /></td>
      </tr>
    </tbody>
  </table>
  <div th:if="${totalPages > 1}">
    <span th:text="#{pages}">Pages:</span>
    <span>[</span>
    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}"
        th:href="@{/owners(page=${i},lastName=${ownerSearch.lastName},city=${ownerSearch.city},telephone=${ownerSearch.telephone},petTypeId=${ownerSearch.petTypeId})}">[[${i}]]</a>
      <span th:unless="${currentPage != i}">[[${i}]]</span>
    </span>
    <span>]&nbsp;</span>
    <span>
      <a th:if="${currentPage > 1}"
        th:href="@{/owners(page=1,lastName=${ownerSearch.lastName},city=${ownerSearch.city},telephone=${ownerSearch.telephone},petTypeId=${ownerSearch.petTypeId})}"
        th:title="#{first}" class="fa fa-fast-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage > 1}"
        th:href="@{/owners(page=${currentPage - 1},lastName=${ownerSearch.lastName},city=${ownerSearch.city},telephone=${ownerSearch.telephone},petTypeId=${ownerSearch.petTypeId})}"
        th:title="#{previous}" class="fa fa-step-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}"
        th:href="@{/owners(page=${currentPage + 1},lastName=${ownerSearch.lastName},city=${ownerSearch.city},telephone=${ownerSearch.telephone},petTypeId=${ownerSearch.petTypeId})}"
        th:title="#{next}" class="fa fa-step-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}"
        th:href="@{/owners(page=${totalPages},lastName=${ownerSearch.lastName},city=${ownerSearch.city},telephone=${ownerSearch.telephone},petTypeId=${ownerSearch.petTypeId})}"
        th:title="#{last}" class="fa fa-fast-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
    </span>
  </div>
</body>

</html>
